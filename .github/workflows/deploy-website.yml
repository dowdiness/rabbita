name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'doc/**'
      - 'examples/**'
      - 'rabbita/**'
      - 'warren/**'
      - 'utils/shiki/**'
      - 'moon.work'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash 
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: MoonBit version
        run: |
          moon version --all

      - name: Update dependencies
        run: |
          moon update

      - name: Install Warren
        run: |
          moon install ./warren

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build homepage
        working-directory: website/homepage
        run: |
          moon check --target js
          moon run --target native scripts/assets.mbtx
          warren build main --dist dist

      - name: Build playground
        working-directory: website/playground
        run: |
          moon check --target js
          MOONBIT_PLAYGROUND_CORE_BUNDLE="$HOME/.moon/lib/core/_build/js/release/bundle" \
          moon run --target native scripts/assets.mbtx
          warren build main --dist dist

      - name: Assemble Pages artifact
        run: |
          rm -rf website/dist
          mkdir -p website/dist
          cp -R website/homepage/dist/. website/dist/
          mkdir -p website/dist/playground
          cp -R website/playground/dist/. website/dist/playground/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
